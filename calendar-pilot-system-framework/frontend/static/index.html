

<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CalendarPilot</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell" data-testid="app-shell">
    <aside class="sidebar" aria-label="Sessions and dogfood runs">
      <div class="brand">
        <div class="brand-mark">CP</div>
        <div>
          <strong>CalendarPilot</strong>
          <span>agentic calendar optimizer</span>
        </div>
      </div>
      <button id="new-chat" class="primary ghost" data-testid="new-chat">New chat</button>
      <div class="sidebar-section">
        <h2>Conversations</h2>
        <div id="session-list" class="nav-list"></div>
      </div>
      <div class="sidebar-section">
        <h2>Recent dogfood runs</h2>
        <div id="recent-runs" class="nav-list muted"></div>
      </div>
      <div class="sidebar-footer">
        <button id="replay-export-sidebar" class="link-button">Export replay</button>
      </div>
    </aside>

    <main class="chat-main">
      <header class="topbar">
        <div>
          <p class="eyebrow">Chat-first machine acting</p>
          <h1>Calendar assistant with real actions</h1>
        </div>
        <div class="topbar-actions">
          <div id="runtime-chip" class="runtime-chip" data-testid="runtime-chip">Fixture mode</div>
          <button id="inspector-toggle" class="secondary" data-testid="inspector-toggle" aria-expanded="true">Inspector</button>
        </div>
      </header>

      <section id="chat-transcript" class="chat-transcript" aria-live="polite" data-testid="chat-transcript"></section>

      <form id="composer" class="composer" data-testid="composer">
        <div id="authority-chip" class="authority-chip">Swift grants required</div>
        <textarea id="goal-input" data-testid="goal-input" rows="1" placeholder="Ask CalendarPilot to improve your week…"></textarea>
        <button id="send-goal" data-testid="send-goal" type="submit" class="primary">Send</button>
      </form>
    </main>

    <aside id="inspector" class="inspector" aria-label="Settings and dogfood inspector">
      <div class="inspector-header">
        <div>
          <p class="eyebrow">Inspector</p>
          <h2>Controls behind the chat</h2>
        </div>
        <button id="close-inspector" class="icon-button" aria-label="Close inspector">×</button>
      </div>
      <nav class="tabs" aria-label="Inspector tabs">
        <button data-tab="runtime" id="tab-runtime" class="tab">Runtime</button>
        <button data-tab="authority" id="tab-authority" class="tab active">Authority</button>
        <button data-tab="profile" id="tab-profile" class="tab">Profile</button>
        <button data-tab="replay" id="tab-replay" class="tab">Replay</button>
        <button data-tab="self_play" id="tab-self-play" class="tab">Self-play</button>
        <button data-tab="provider" id="tab-provider" class="tab">Provider</button>
        <button data-tab="debug" id="tab-debug" class="tab">Debug</button>
      </nav>
      <div id="inspector-content" class="inspector-content"></div>
    </aside>
  </div>

  <template id="message-template">
    <article class="message">
      <div class="avatar"></div>
      <div class="bubble">
        <h3></h3>
        <p></p>
        <div class="cards"></div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
