name: P13 ruler

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  deterministic-ruler:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: calendar-pilot-p12/pyproject.toml
      - name: Install active app
        run: python -m pip install -e 'calendar-pilot-p12[evals]'
      - name: Verify repository diff hygiene
        run: git diff --check
      - name: Run deterministic compatibility baseline
        run: |
          make py-test
          make check-invariants
          make architecture-eval-test
          make architecture-eval-v2-test
          make p13-ruler-test
          make p13-loc-report
          make architecture-evals
      - name: Freeze P13 instrument identity
        run: |
          openssl genpkey -algorithm RSA -pkeyopt rsa_keygen_bits:2048 -out "$RUNNER_TEMP/p13-signing-private.pem"
          openssl pkey -in "$RUNNER_TEMP/p13-signing-private.pem" -pubout -out "$RUNNER_TEMP/p13-signing-public.pem"
          make p13-instrument P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
          make wave-bind WAVE=p13-ruler-truth-repair CHANGE_CLASS=ruler P13_SIGNING_KEY="$RUNNER_TEMP/p13-signing-private.pem" P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
          make binding-manifest-verify WAVE=p13-ruler-truth-repair P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
          make architecture-evals-v2 WAVE=p13-ruler-truth-repair P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
          make wave-bind WAVE=p13-wave-harness-v3 CHANGE_CLASS=ruler P13_SIGNING_KEY="$RUNNER_TEMP/p13-signing-private.pem" P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
          make wave-harness WAVE=p13-wave-harness-v3 P13_VERIFY_KEY="$RUNNER_TEMP/p13-signing-public.pem"
      - name: Assert report decisions
        run: |
          jq -e '.decision == "pass" and .file_count > 0 and .total_lines > 0' calendar-pilot-p12/runs/p13_loc_report.json
          jq -e '.p13_instrument_bundle_schema_version == "p13_instrument_bundle.v1" and (.artifacts | length) > 0' calendar-pilot-p12/runs/p13_instrument_bundle.json
          jq -e '.decision == "pass" and .rails.preservation.decision == "pass" and .rails.preservation.scenario_count == 11' calendar-pilot-p12/runs/architecture_evals/architecture_eval_report.json
          jq -e '.architecture_eval_report_schema_version == "architecture_eval_report.v2" and .decision == "pass" and .rails.preservation.decision == "pass" and ([.scenarios[] | select(.rail == "target_conformance" and .gate_mode == "required" and .status != "pass")] | length) == 0' calendar-pilot-p12/runs/architecture_evals/architecture_eval_report_v2.json
          jq -e '.decision == "pass" and .ok == true' calendar-pilot-p12/runs/p12_release/p12_release_report.json
          jq -e '.decision == "pass" and .ok == true and ([.gates[] | select(. != "pass")] | length) == 0' calendar-pilot-p12/runs/p13_wave_gate_report.json
          jq -e '.experiment_record_schema_version == "experiment_record.v2" and .phase == "P13" and .decision == "pass"' calendar-pilot-p12/runs/p13_wave_gate/p13-wave-harness-v3/experiment_record.json
          jq -e '.reward_head_report_schema_version == "reward_head_report.v3" and .decision == "pass" and .reward_evidence.occurrence_ids_unique == true' calendar-pilot-p12/runs/p13_wave_gate/p13-wave-harness-v3/reward_screen_report.json
